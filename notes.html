<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus | Notes Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fbfdfe; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,160,180,0.2); padding: 14px 0; z-index: 100; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #0b6b72, #00c2d1); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #ecfdf5; padding: 4px 8px; border-radius: 60px; }
        .lang-btn { padding: 6px 14px; border-radius: 40px; font-weight: 500; cursor: pointer; background: transparent; border: none; }
        .lang-btn.active { background: #00c2d1; color: white; }
        .progress-bar { position: fixed; top: 70px; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 99; }
        .progress-fill { width: 0%; height: 4px; background: #00c2d1; transition: width 0.2s; }
        .notes-container { background: white; border-radius: 32px; padding: 48px 40px; margin: 32px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #edf2f7; }
        .notes-container h1 { font-size: 2rem; margin-bottom: 24px; }
        .notes-container h2 { margin: 24px 0 12px; }
        .notes-container h3 { margin: 20px 0 10px; }
        .notes-container p { margin: 16px 0; line-height: 1.6; color: #334155; }
        .notes-container ul, .notes-container ol { margin: 12px 0 12px 24px; }
        .notes-container pre { background: #f1f5f9; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 16px 0; }
        .notes-container code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-family: monospace; }
        .blur-content { filter: blur(5px); pointer-events: none; user-select: none; }
        .unlock-overlay { text-align: center; margin: 32px 0; }
        .btn { background: #00b4c4; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 400px; width: 90%; border-radius: 32px; padding: 32px; text-align: center; }
        .modal-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #cbd5e1; }
        .back-btn { display: inline-block; margin: 20px 0; color: #00a2b3; text-decoration: none; }
        @media (max-width: 768px) { .notes-container { padding: 24px 20px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="container" id="app"></div>

    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentLang = localStorage.getItem('bca_lang') || 'en';
        let currentNote = null;
        let isUnlocked = false;
        
        async function loadNotes() {
            const noteId = new URLSearchParams(window.location.search).get('id');
            if(!noteId) return (window.location.href = 'index.html');
            
            // Check local unlock status
            isUnlocked = localStorage.getItem(`unlocked_${noteId}`) === 'true';
            
            const { data: note } = await supabase.from('notes').select('*').eq('id', noteId).single();
            if(!note) return;
            currentNote = note;
            renderContent();
        }
        
        function renderContent() {
            const content = currentLang === 'en' ? currentNote.english_content : currentNote.hindi_content;
            const app = document.getElementById('app');
            
            let displayContent = content || '<p>Content coming soon...</p>';
            let showBlur = !isUnlocked;
            
            if(showBlur && displayContent.length > 100) {
                // 30% preview logic
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = displayContent;
                const text = tempDiv.innerText || tempDiv.textContent;
                const words = text.split(' ');
                const previewLength = Math.floor(words.length * 0.3);
                const previewText = words.slice(0, previewLength).join(' ');
                displayContent = `<div class="blur-content">${displayContent}</div><div style="margin-top:20px; padding:16px; background:#f0f9ff; border-radius:16px;"><p>✨ ${previewText}...</p><p style="margin-top:12px;"><strong>📖 30% preview shown. Unlock for complete notes!</strong></p></div>`;
            } else if(!showBlur) {
                displayContent = content;
            }
            
            app.innerHTML = `
                <a href="javascript:history.back()" class="back-btn">← Back to Unit</a>
                <div class="notes-container" id="notesReader">
                    <h1>${currentNote.title}</h1>
                    <div id="noteBody">${displayContent}</div>
                </div>
                <div style="display: flex; gap: 12px; justify-content: center; margin: 24px 0;">
                    <button id="copyBtn" class="btn" style="background:#334155;">📋 Copy Text</button>
                    ${!isUnlocked ? `<button id="unlockBtn" class="btn">🔓 Unlock Full Notes</button>` : ''}
                </div>
            `;
            
            document.getElementById('copyBtn')?.addEventListener('click', () => {
                const text = document.getElementById('noteBody').innerText;
                navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            });
            
            document.getElementById('unlockBtn')?.addEventListener('click', showUnlockModal);
            
            // Scroll progress
            window.addEventListener('scroll', updateProgress);
            updateProgress();
        }
        
        function updateProgress() {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progressFill').style.width = scrolled + '%';
        }
        
        function showUnlockModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>✨ Unlock Complete Notes</h3>
                    <p style="margin:12px 0; color:#64748b;">Get full access + PDF downloads</p>
                    <input type="text" id="leadName" placeholder="Full Name" required>
                    <input type="tel" id="leadMobile" placeholder="Mobile Number" required>
                    <button id="submitUnlock" class="btn" style="margin-top:12px; width:100%;">Unlock Now →</button>
                    <button id="closeModal" style="margin-top:12px; background:none; border:none; color:#64748b; cursor:pointer;">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('submitUnlock').onclick = async () => {
                const name = document.getElementById('leadName').value;
                const mobile = document.getElementById('leadMobile').value;
                if(!name || !mobile) return alert('Please fill all fields');
                
                await supabase.from('leads').insert([{ name, mobile, created_at: new Date() }]);
                localStorage.setItem(`unlocked_${new URLSearchParams(window.location.search).get('id')}`, 'true');
                isUnlocked = true;
                modal.remove();
                renderContent();
                alert('✅ Notes unlocked! Enjoy full access.');
            };
            
            document.getElementById('closeModal').onclick = () => modal.remove();
        }
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bca_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderContent();
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
        });
        
        loadNotes();
    </script>
</body>
</html>
