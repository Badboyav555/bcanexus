<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BCA Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: #e2e8f0; padding: 24px; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h2 { color: #00c2d1; margin-bottom: 32px; }
        .sidebar nav a { display: block; padding: 12px 16px; margin: 4px 0; color: #cbd5e1; text-decoration: none; border-radius: 12px; cursor: pointer; }
        .sidebar nav a:hover, .sidebar nav a.active { background: #1e293b; color: #00c2d1; }
        .content { margin-left: 260px; flex: 1; padding: 24px 32px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-family: inherit; }
        button { background: #00b4c4; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        button.danger { background: #ef4444; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 32px; text-align: center; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .content { margin-left: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentSection = 'dashboard';
        
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                showLogin();
            } else {
                showAdminPanel(session.user.email);
                loadSection(currentSection);
            }
        }
        
        function showLogin() {
            document.getElementById('root').innerHTML = `
                <div class="login-box">
                    <h2 style="color: #00c2d1;">Admin Login</h2>
                    <p style="margin: 16px 0;">Enter your credentials</p>
                    <input type="email" id="adminEmail" placeholder="Email" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #cbd5e1;">
                    <input type="password" id="adminPassword" placeholder="Password" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #cbd5e1;">
                    <button onclick="login()" style="margin-top:16px; width:100%;">Login →</button>
                    <p style="margin-top:16px; font-size:0.8rem;">Create account in Supabase Auth first</p>
                </div>
            `;
        }
        
        window.login = async () => {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert('Login failed: ' + error.message);
            else location.reload();
        };
        
        function showAdminPanel(email) {
            document.getElementById('root').innerHTML = `
                <div class="admin-container">
                    <div class="sidebar">
                        <h2>🔷 BCA Nexus</h2>
                        <nav>
                            <a data-section="dashboard">📊 Dashboard</a>
                            <a data-section="semesters">📚 Semesters</a>
                            <a data-section="subjects">📖 Subjects</a>
                            <a data-section="units">📁 Units</a>
                            <a data-section="notes">📝 Notes</a>
                            <a data-section="pyqs">📜 PYQs</a>
                            <a data-section="questions">⭐ Important Qs</a>
                            <a data-section="leads">👥 Leads</a>
                            <a id="logoutBtn" style="color:#ef4444;">🚪 Logout</a>
                        </nav>
                    </div>
                    <div class="content">
                        <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
                            <h1 id="sectionTitle">Dashboard</h1>
                            <span>👤 ${email}</span>
                        </div>
                        <div id="dynamicPanel"></div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.sidebar nav a').forEach(a => {
                if (a.id !== 'logoutBtn') {
                    a.addEventListener('click', () => {
                        currentSection = a.dataset.section;
                        document.getElementById('sectionTitle').innerText = a.innerText;
                        loadSection(currentSection);
                    });
                }
            });
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await supabase.auth.signOut();
                location.reload();
            });
        }
        
        async function loadSection(section) {
            const panel = document.getElementById('dynamicPanel');
            if (section === 'semesters') await renderSemesters(panel);
            else if (section === 'subjects') await renderSubjects(panel);
            else if (section === 'units') await renderUnits(panel);
            else if (section === 'notes') await renderNotes(panel);
            else if (section === 'pyqs') await renderPYQs(panel);
            else if (section === 'questions') await renderImpQs(panel);
            else if (section === 'leads') await renderLeads(panel);
            else panel.innerHTML = `<div class="card"><h3>Welcome Admin</h3><p>Manage semesters, subjects, notes, PYQs, and track leads.</p></div>`;
        }
        
        async function renderSemesters(panel) {
            const { data } = await supabase.from('semesters').select('*');
            panel.innerHTML = `
                <div class="card"><h3>➕ Add Semester</h3><input id="semName" placeholder="Semester Number (1,2,3...)" style="width:300px"><button onclick="addSemester()" style="margin-left:10px">Add</button></div>
                <div class="card"><h3>📚 Semesters List</h3> <table><tr><th>ID</th><th>Name</th><th>Action</th></tr>${data?.map(s => `<tr><td>${s.id}</td><td>Semester ${s.name}</td><td><button class="danger" onclick="deleteItem('semesters',${s.id})">Delete</button></td></tr>`).join('')}</table></div>
            `;
            window.addSemester = async () => {
                const name = document.getElementById('semName').value;
                if(name) await supabase.from('semesters').insert([{ name }]);
                loadSection('semesters');
            };
        }
        
        async function renderSubjects(panel) {
            const { data: subjects } = await supabase.from('subjects').select('*, semesters(name)');
            const { data: sems } = await supabase.from('semesters').select('*');
            panel.innerHTML = `
                <div class="card"><h3>➕ Add Subject</h3><select id="semesterId">${sems?.map(s=>`<option value="${s.id}">Semester ${s.name}</option>`)}</select><input id="subName" placeholder="Subject Name"><button onclick="addSubject()">Add</button></div>
                <div class="card"><h3>📖 Subjects List</h3><table><tr><th>Name</th><th>Semester</th><th>Action</th></tr>${subjects?.map(s=>`<tr><td>${s.name}</td><td>Semester ${s.semesters?.name}</td><td><button onclick="deleteItem('subjects',${s.id})">Delete</button></td></tr>`).join('')}</table></div>
            `;
            window.addSubject = async () => {
                const semester_id = document.getElementById('semesterId').value;
                const name = document.getElementById('subName').value;
                if(name) await supabase.from('subjects').insert([{ semester_id, name }]);
                loadSection('subjects');
            };
        }
        
        async function renderUnits(panel) {
            const { data: subs } = await supabase.from('subjects').select('*');
            const { data: units } = await supabase.from('units').select('*, subjects(name)');
            panel.innerHTML = `
                <div class="card"><h3>➕ Add Unit</h3><select id="subjectId">${subs?.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><input id="unitName" placeholder="Unit Name"><button onclick="addUnit()">Add</button></div>
                <div class="card"><h3>📁 Units List</h3><table><tr><th>Name</th><th>Subject</th><th>Action</th></tr>${units?.map(u=>`<tr><td>${u.name}</td><td>${u.subjects?.name}</td><td><button onclick="deleteItem('units',${u.id})">Delete</button></td></tr>`).join('')}</table></div>
            `;
            window.addUnit = async () => {
                const subject_id = document.getElementById('subjectId').value;
                const name = document.getElementById('unitName').value;
                if(name) await supabase.from('units').insert([{ subject_id, name }]);
                loadSection('units');
            };
        }
        
        async function renderNotes(panel) {
            const { data: units } = await supabase.from('units').select('*, subjects(name)');
            const { data: notes } = await supabase.from('notes').select('*, units(name)');
            panel.innerHTML = `
                <div class="card"><h3>📝 Add Note</h3><select id="unitId">${units?.map(u=>`<option value="${u.id}">${u.name} (${u.subjects?.name})</option>`)}</select><input id="noteTitle" placeholder="Title"><textarea id="engContent" rows="6" placeholder="English Content (HTML supported)"></textarea><textarea id="hinContent" rows="4" placeholder="Hindi Content (HTML supported)"></textarea><button onclick="addNote()">Publish Note</button></div>
                <div class="card"><h3>📄 Existing Notes</h3>${notes?.map(n=>`<p><strong>${n.title}</strong> - Unit: ${n.units?.name} <button onclick="deleteItem('notes',${n.id})">Delete</button></p>`).join('')}</div>
            `;
            window.addNote = async () => {
                const unit_id = document.getElementById('unitId').value;
                const title = document.getElementById('noteTitle').value;
                const english_content = document.getElementById('engContent').value;
                const hindi_content = document.getElementById('hinContent').value;
                if(title) await supabase.from('notes').insert([{ unit_id, title, english_content, hindi_content }]);
                loadSection('notes');
            };
        }
        
        async function renderPYQs(panel) {
            const { data: units } = await supabase.from('units').select('*');
            const { data: pyqs } = await supabase.from('pyqs').select('*, units(name)');
            panel.innerHTML = `
                <div class="card"><h3>📜 Add PYQ</h3><select id="pyqUnitId">${units?.map(u=>`<option value="${u.id}">${u.name}</option>`)}</select><input id="year" placeholder="Year (2023,2024...)"><input id="question" placeholder="Question"><textarea id="answer" rows="3" placeholder="Answer"></textarea><select id="difficulty"><option>Easy</option><option>Medium</option><option>Hard</option></select><button onclick="addPYQ()">Add</button></div>
                <div class="card"><h3>📋 PYQs List</h3>${pyqs?.map(p=>`<p>📅 ${p.year}: ${p.question.substring(0,50)}... <button onclick="deleteItem('pyqs',${p.id})">Delete</button></p>`).join('')}</div>
            `;
            window.addPYQ = async () => {
                const unit_id = document.getElementById('pyqUnitId').value;
                const year = document.getElementById('year').value;
                const question = document.getElementById('question').value;
                const answer = document.getElementById('answer').value;
                const difficulty = document.getElementById('difficulty').value;
                if(question) await supabase.from('pyqs').insert([{ unit_id, year, question, answer, difficulty }]);
                loadSection('pyqs');
            };
        }
        
        async function renderImpQs(panel) {
            const { data: units } = await supabase.from('units').select('*');
            const { data: qs } = await supabase.from('important_questions').select('*, units(name)');
            panel.innerHTML = `
                <div class="card"><h3>⭐ Add Important Question</h3><select id="impUnitId">${units?.map(u=>`<option value="${u.id}">${u.name}</option>`)}</select><input id="category" placeholder="Category (Viva/Most Repeated/Short/Long)"><input id="qtext" placeholder="Question"><textarea id="ansText" rows="3" placeholder="Answer"></textarea><button onclick="addImpQ()">Add</button></div>
                <div class="card"><h3>📋 Questions List</h3>${qs?.map(q=>`<p><strong>${q.category}:</strong> ${q.question.substring(0,60)}... <button onclick="deleteItem('important_questions',${q.id})">Delete</button></p>`).join('')}</div>
            `;
            window.addImpQ = async () => {
                const unit_id = document.getElementById('impUnitId').value;
                const category = document.getElementById('category').value;
                const question = document.getElementById('qtext').value;
                const answer = document.getElementById('ansText').value;
                if(question) await supabase.from('important_questions').insert([{ unit_id, category, question, answer }]);
                loadSection('questions');
            };
        }
        
        async function renderLeads(panel) {
            const { data } = await supabase.from('leads').select('*').order('created_at', { ascending: false });
            panel.innerHTML = `<div class="card"><h3>👥 Lead Submissions (${data?.length || 0})</h3><table><tr><th>Name</th><th>Mobile</th><th>Date</th></tr>${data?.map(l=>`<tr><td>${l.name}</td><td>${l.mobile}</td><td>${new Date(l.created_at).toLocaleDateString()}</td></tr>`).join('')}</table></div>`;
        }
        
        window.deleteItem = async (table, id) => {
            if(confirm('Delete this item?')) {
                await supabase.from(table).delete().eq('id', id);
                loadSection(currentSection);
            }
        };
        
        checkAuth();
    </script>
</body>
</html>
