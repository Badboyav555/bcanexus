<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus | Semesters</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fbfdfe; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,160,180,0.2); padding: 14px 0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #0b6b72, #00c2d1); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #ecfdf5; padding: 4px 8px; border-radius: 60px; }
        .lang-btn { padding: 6px 14px; border-radius: 40px; font-weight: 500; cursor: pointer; background: transparent; border: none; }
        .lang-btn.active { background: #00c2d1; color: white; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 32px 0; }
        .subject-card { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #edf2f7; cursor: pointer; transition: 0.2s; }
        .subject-card:hover { border-color: #00c2d1; transform: translateY(-3px); }
        .search-bar { max-width: 400px; margin: 20px 0; background: white; border-radius: 60px; border: 1px solid #e2e8f0; padding: 10px 20px; }
        .back-btn { display: inline-block; margin: 20px 0; color: #00a2b3; text-decoration: none; }
        @media (max-width: 640px) { .grid-cards { gap: 14px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>
    <div class="container" id="app"></div>

    <script>
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentLang = localStorage.getItem('bca_lang') || 'en';
        
        async function loadPage() {
            const params = new URLSearchParams(window.location.search);
            const semId = params.get('id');
            const searchTerm = params.get('search');
            
            let subjects = [];
            if(semId) {
                const { data } = await supabase.from('subjects').select('*').eq('semester_id', semId);
                subjects = data || [];
            } else if(searchTerm) {
                const { data } = await supabase.from('subjects').select('*').ilike('name', `%${searchTerm}%`);
                subjects = data || [];
            }
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <a href="index.html" class="back-btn">← Back to Home</a>
                <h2>${semId ? 'Subjects' : 'Search Results'}</h2>
                <input type="text" id="subSearch" placeholder="Filter subjects..." class="search-bar">
                <div id="subjectsGrid" class="grid-cards"></div>
            `;
            
            function renderSubjects(filtered) {
                const grid = document.getElementById('subjectsGrid');
                if(filtered.length === 0) grid.innerHTML = '<p>No subjects found.</p>';
                else grid.innerHTML = filtered.map(sub => `<div class="subject-card" data-id="${sub.id}"><strong>${sub.name}</strong><div style="font-size:0.7rem; margin-top:8px;">→ View Units</div></div>`).join('');
                
                document.querySelectorAll('.subject-card').forEach(card => {
                    card.addEventListener('click', () => window.location.href = `subject.html?id=${card.dataset.id}`);
                });
            }
            
            renderSubjects(subjects);
            document.getElementById('subSearch')?.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                renderSubjects(subjects.filter(s => s.name.toLowerCase().includes(term)));
            });
        }
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bca_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
        });
        
        loadPage();
    </script>
</body>
</html>
