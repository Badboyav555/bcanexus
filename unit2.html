<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus | Unit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fbfdfe; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,160,180,0.2); padding: 14px 0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #0b6b72, #00c2d1); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #ecfdf5; padding: 4px 8px; border-radius: 60px; }
        .lang-btn { padding: 6px 14px; border-radius: 40px; font-weight: 500; cursor: pointer; background: transparent; border: none; }
        .lang-btn.active { background: #00c2d1; color: white; }
        .tabs { display: flex; gap: 12px; margin: 24px 0; border-bottom: 1px solid #e2e8f0; }
        .tab-btn { background: none; border: none; padding: 12px 24px; font-weight: 500; cursor: pointer; color: #64748b; }
        .tab-btn.active { color: #00c2d1; border-bottom: 2px solid #00c2d1; }
        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 16px; }
        .note-card { cursor: pointer; transition: 0.2s; }
        .note-card:hover { border-color: #00c2d1; }
        details { margin-bottom: 12px; padding: 12px; background: white; border-radius: 16px; border: 1px solid #edf2f7; }
        details summary { font-weight: 600; cursor: pointer; }
        .back-btn { display: inline-block; margin: 20px 0; color: #00a2b3; text-decoration: none; }
        @media (max-width: 640px) { .tab-btn { padding: 8px 16px; font-size: 0.85rem; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>
    <div class="container" id="app"></div>

    <script>
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentLang = localStorage.getItem('bca_lang') || 'en';
        let notesData = [], pyqsData = [], impData = [];
        
        async function loadPage() {
            const unitId = new URLSearchParams(window.location.search).get('id');
            if(!unitId) return (window.location.href = 'index.html');
            
            const { data: notes } = await supabase.from('notes').select('*').eq('unit_id', unitId);
            const { data: pyqs } = await supabase.from('pyqs').select('*').eq('unit_id', unitId);
            const { data: impQs } = await supabase.from('important_questions').select('*').eq('unit_id', unitId);
            const { data: unit } = await supabase.from('units').select('name').eq('id', unitId).single();
            
            notesData = notes || [];
            pyqsData = pyqs || [];
            impData = impQs || [];
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <a href="javascript:history.back()" class="back-btn">← Back</a>
                <h2>${unit?.name || 'Unit'}</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="notes">📄 Notes (${notesData.length})</button>
                    <button class="tab-btn" data-tab="pyq">📜 PYQs (${pyqsData.length})</button>
                    <button class="tab-btn" data-tab="imp">⭐ Important Qs (${impData.length})</button>
                </div>
                <div id="tabContent"></div>
            `;
            
            showTab('notes');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showTab(btn.dataset.tab);
                });
            });
        }
        
        function showTab(tab) {
            const container = document.getElementById('tabContent');
            if(tab === 'notes') {
                if(notesData.length === 0) container.innerHTML = '<div class="glass-card">No notes uploaded yet.</div>';
                else container.innerHTML = `<div style="display:grid; gap:16px;">${notesData.map(n => `<div class="glass-card note-card" data-id="${n.id}"><strong>📘 ${n.title}</strong><div style="font-size:0.8rem; color:#64748b; margin-top:6px;">Click to read full notes →</div></div>`).join('')}</div>`;
                
                document.querySelectorAll('.note-card').forEach(card => {
                    card.addEventListener('click', () => window.location.href = `notes.html?id=${card.dataset.id}`);
                });
            } 
            else if(tab === 'pyq') {
                if(pyqsData.length === 0) container.innerHTML = '<div class="glass-card">No PYQs available.</div>';
                else container.innerHTML = pyqsData.map(p => `
                    <details>
                        <summary>📅 ${p.year} · ${p.difficulty || 'Medium'} Difficulty</summary>
                        <div style="margin-top: 12px;"><strong>Question:</strong> ${p.question}</div>
                        <div style="margin-top: 8px;"><strong>Answer:</strong> ${p.answer || 'Answer key coming soon.'}</div>
                    </details>
                `).join('');
            }
            else if(tab === 'imp') {
                if(impData.length === 0) container.innerHTML = '<div class="glass-card">No important questions yet.</div>';
                else {
                    const grouped = {};
                    impData.forEach(q => { if(!grouped[q.category]) grouped[q.category] = []; grouped[q.category].push(q); });
                    let html = '';
                    for(let cat in grouped) {
                        html += `<h3 style="margin: 16px 0 8px;">📌 ${cat}</h3>`;
                        html += grouped[cat].map(q => `<div class="glass-card" style="margin-bottom:12px;"><strong>❓ ${q.question}</strong><div style="margin-top:8px; color:#475569;">${q.answer || ''}</div></div>`).join('');
                    }
                    container.innerHTML = html;
                }
            }
        }
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bca_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
        });
        
        loadPage();
    </script>
</body>
</html>
