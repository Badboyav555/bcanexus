<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 0; position: sticky; top: 0; z-index: 100; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #0b6b72, #00c2d1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #f1f5f9; padding: 4px; border-radius: 40px; }
        .lang-btn { padding: 8px 20px; border-radius: 32px; border: none; cursor: pointer; font-weight: 500; background: transparent; }
        .lang-btn.active { background: #00c2d1; color: white; }
        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-size: 3rem; margin-bottom: 16px; background: linear-gradient(135deg, #0b6b72, #0891b2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { max-width: 500px; margin: 30px auto 0; background: white; border-radius: 60px; border: 1px solid #e2e8f0; padding: 12px 24px; display: flex; gap: 12px; }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .card { background: white; border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-4px); border-color: #00c2d1; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .footer { text-align: center; padding: 40px 0; border-top: 1px solid #e2e8f0; margin-top: 60px; color: #64748b; }
        h2 { margin: 20px 0 10px; font-size: 1.5rem; }
        @media (max-width: 640px) { .hero h1 { font-size: 2rem; } .grid { gap: 12px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">📘 BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Master BCA<br>Futuristically</h1>
            <p style="color: #475569;">Notes · PYQs · Smart Learning</p>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search semesters, subjects...">
            </div>
        </div>

        <h2>📚 All Semesters</h2>
        <div id="semestersGrid" class="grid"></div>

        <h2>🔥 Trending Subjects</h2>
        <div id="trendingGrid" class="grid"></div>

        <h2>📄 Latest Notes</h2>
        <div id="latestGrid" class="grid"></div>
    </div>

    <div class="footer">
        <p>© 2025 BCA Nexus — Premium Learning Platform</p>
    </div>

    <script>
        // 🔧 REPLACE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentLang = localStorage.getItem('lang') || 'en';

        // Load all data
        async function loadData() {
            try {
                // Load semesters
                const { data: semesters, error: semError } = await supabase.from('semesters').select('*').order('id');
                if (semError) throw semError;
                
                const semGrid = document.getElementById('semestersGrid');
                if (semGrid && semesters && semesters.length > 0) {
                    semGrid.innerHTML = semesters.map(s => `
                        <div class="card" onclick="gotoSemester(${s.id})">
                            <div style="font-size: 2rem;">📖</div>
                            <div style="font-weight: 600; margin-top: 8px;">Semester ${s.name}</div>
                            <div style="font-size: 0.8rem; color: #00c2d1;">Explore →</div>
                        </div>
                    `).join('');
                } else {
                    semGrid.innerHTML = '<div class="card">No semesters yet. Add in admin panel.</div>';
                }

                // Load trending subjects
                const { data: subjects } = await supabase.from('subjects').select('*').limit(6);
                const trendGrid = document.getElementById('trendingGrid');
                if (trendGrid && subjects && subjects.length > 0) {
                    trendGrid.innerHTML = subjects.map(s => `
                        <div class="card" onclick="gotoSubject(${s.id})">
                            <div style="font-size: 1.5rem;">📚</div>
                            <div style="font-weight: 500;">${s.name}</div>
                        </div>
                    `).join('');
                } else {
                    trendGrid.innerHTML = '<div class="card">Add subjects in admin panel</div>';
                }

                // Load latest notes
                const { data: notes } = await supabase.from('notes').select('*').order('id', { ascending: false }).limit(6);
                const latestGrid = document.getElementById('latestGrid');
                if (latestGrid && notes && notes.length > 0) {
                    latestGrid.innerHTML = notes.map(n => `
                        <div class="card" onclick="gotoNote(${n.id})">
                            <div style="font-size: 1.2rem;">📝</div>
                            <div style="font-weight: 500;">${n.title.substring(0, 30)}</div>
                        </div>
                    `).join('');
                } else {
                    latestGrid.innerHTML = '<div class="card">No notes yet. Add in admin panel</div>';
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('semestersGrid').innerHTML = '<div class="card">Error loading data. Check Supabase connection.</div>';
            }
        }

        // Navigation functions
        window.gotoSemester = (id) => { window.location.href = `semester.html?id=${id}`; };
        window.gotoSubject = (id) => { window.location.href = `subject.html?id=${id}`; };
        window.gotoNote = (id) => { window.location.href = `notes.html?id=${id}`; };

        // Language toggle
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // Search
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            if (e.target.value.length > 2) {
                window.location.href = `semester.html?search=${encodeURIComponent(e.target.value)}`;
            }
        });

        // Initialize
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });

        loadData();
    </script>
</body>
</html>
