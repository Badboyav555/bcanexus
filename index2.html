<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BCA Nexus | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fbfdfe; color: #11181c; line-height: 1.4; }
        .glass-card { background: rgba(255,255,255,0.96); backdrop-filter: blur(2px); border: 1px solid rgba(0,200,200,0.2); border-radius: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0,180,200,0.5); box-shadow: 0 12px 28px rgba(0,180,200,0.08); transform: translateY(-2px); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        .navbar { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,160,180,0.2); padding: 14px 0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #0b6b72 0%, #00c2d1 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #ecfdf5; padding: 4px 8px; border-radius: 60px; border: 1px solid #cffafe; }
        .lang-btn { padding: 6px 14px; border-radius: 40px; font-weight: 500; font-size: 0.85rem; cursor: pointer; background: transparent; border: none; transition: 0.2s; }
        .lang-btn.active { background: #00c2d1; color: white; box-shadow: 0 2px 6px rgba(0,194,209,0.3); }
        .hero { padding: 48px 0 32px; text-align: center; }
        .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 700; background: linear-gradient(135deg, #0b6b72, #0891b2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .search-bar { max-width: 560px; margin: 28px auto 0; background: white; border-radius: 60px; border: 1px solid #e2e8f0; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 1rem; background: transparent; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin: 32px 0; }
        .sem-card, .subject-card { background: white; border-radius: 20px; padding: 18px 12px; text-align: center; border: 1px solid #edf2f7; cursor: pointer; transition: all 0.2s; }
        .sem-card:hover, .subject-card:hover { border-color: #00c2d1; transform: translateY(-3px); }
        .footer { margin-top: 70px; padding: 32px 0; text-align: center; border-top: 1px solid #eef2ff; font-size: 0.85rem; }
        @media (max-width: 640px) { .container { padding: 0 16px; } .grid-cards { gap: 14px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>
    <main class="container" id="app">
        <div class="hero">
            <h1>Master BCA,<br>Futuristically.</h1>
            <p style="margin-top: 12px; color:#4b5563;">Notes · PYQs · Semesters · AI-ready study hub</p>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="globalSearch" placeholder="Search semesters, subjects, notes...">
            </div>
        </div>
        <div style="margin: 24px 0 8px;"><strong>📚 All Semesters</strong></div>
        <div id="semesterGrid" class="grid-cards"></div>
        <div style="margin: 32px 0 8px;"><strong>🔥 Trending Subjects</strong></div>
        <div id="trendingGrid" class="grid-cards"></div>
        <div style="margin: 32px 0 8px;"><strong>📄 Latest Notes</strong></div>
        <div id="latestNotesGrid" class="grid-cards"></div>
    </main>
    <div class="footer"><p>© 2025 BCA Nexus — futuristic study platform</p></div>

    <script>
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentLang = localStorage.getItem('bca_lang') || 'en';
        
        async function fetchSemesters() {
            const { data } = await supabase.from('semesters').select('*').order('id');
            return data || [];
        }
        
        async function loadSemesterCards() {
            const semesters = await fetchSemesters();
            const container = document.getElementById('semesterGrid');
            container.innerHTML = semesters.map(s => `<div class="sem-card" data-id="${s.id}"><div style="font-weight:700; font-size:1.3rem;">Semester ${s.name}</div><div style="font-size:0.8rem; color:#2c7a7b;">explore →</div></div>`).join('');
            document.querySelectorAll('.sem-card').forEach(card => {
                card.addEventListener('click', () => window.location.href = `semester.html?id=${card.dataset.id}`);
            });
        }
        
        async function loadTrending() {
            const { data } = await supabase.from('subjects').select('*').limit(6);
            document.getElementById('trendingGrid').innerHTML = (data || []).map(s => `<div class="subject-card">${s.name} · 📖</div>`).join('');
        }
        
        async function loadLatestNotes() {
            const { data } = await supabase.from('notes').select('title, id').order('id', {ascending: false}).limit(6);
            document.getElementById('latestNotesGrid').innerHTML = (data || []).map(n => `<div class="subject-card">📘 ${n.title.substring(0,28)}</div>`).join('');
        }
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bca_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
        });
        
        document.getElementById('globalSearch')?.addEventListener('input', (e) => {
            if(e.target.value.length > 2) window.location.href = `semester.html?search=${encodeURIComponent(e.target.value)}`;
        });
        
        loadSemesterCards();
        loadTrending();
        loadLatestNotes();
    </script>
</body>
</html>
