<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus - Units</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #0b6b72, #00c2d1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .lang-toggle { display: flex; gap: 8px; background: #f1f5f9; padding: 4px; border-radius: 40px; }
        .lang-btn { padding: 8px 20px; border-radius: 32px; border: none; cursor: pointer; background: transparent; }
        .lang-btn.active { background: #00c2d1; color: white; }
        .back-link { display: inline-block; margin: 20px 0; color: #00a2b3; text-decoration: none; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 30px 0; }
        .card { background: white; border-radius: 20px; padding: 24px; cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-4px); border-color: #00c2d1; }
        .footer { text-align: center; padding: 40px 0; border-top: 1px solid #e2e8f0; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">BCA NEXUS</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </div>
    </div>

    <div class="container" id="app"></div>
    <div class="footer"><p>BCA Nexus — Your Study Partner</p></div>

    <script>
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentLang = localStorage.getItem('lang') || 'en';

        async function loadPage() {
            const subId = new URLSearchParams(window.location.search).get('id');
            if (!subId) {
                window.location.href = 'index.html';
                return;
            }
            
            const { data: units } = await supabase.from('units').select('*').eq('subject_id', subId);
            const { data: subject } = await supabase.from('subjects').select('name').eq('id', subId).single();
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="back-link" onclick="history.back()">← Back to Subjects</div>
                <h1>${subject?.name || 'Subject'} - Units</h1>
                <div id="unitsGrid" class="grid"></div>
            `;
            
            const grid = document.getElementById('unitsGrid');
            if (!units || units.length === 0) {
                grid.innerHTML = '<div class="card">No units available. Add units in admin panel.</div>';
                return;
            }
            
            grid.innerHTML = units.map(u => `
                <div class="card" onclick="gotoUnit(${u.id})">
                    <div style="font-size: 2rem;">📁</div>
                    <div style="font-weight: 600; margin-top: 8px;">${u.name}</div>
                    <div style="font-size: 0.75rem; color: #64748b; margin-top: 8px;">Notes + PYQs + Questions</div>
                </div>
            `).join('');
        }
        
        window.gotoUnit = (id) => { window.location.href = `unit.html?id=${id}`; };
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });
        
        loadPage();
    </script>
</body>
</html>
