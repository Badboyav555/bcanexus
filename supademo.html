<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Nexus - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 0; position: sticky; top: 0; z-index: 100; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #0f766e, #0891b2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 16px; }
        .search-box { max-width: 500px; margin: 30px auto; background: white; border-radius: 60px; padding: 12px 24px; display: flex; gap: 12px; border: 1px solid #e2e8f0; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 1rem; background: transparent; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .card { background: white; border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-4px); border-color: #0891b2; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .footer { text-align: center; padding: 40px 0; border-top: 1px solid #e2e8f0; margin-top: 60px; color: #64748b; }
        h2 { margin: 20px 0 10px; font-size: 1.25rem; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        @media (max-width: 640px) { .hero h1 { font-size: 1.8rem; } .grid { gap: 12px; } .card { padding: 16px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">📘 BCA NEXUS</div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Master BCA<br>Futuristically</h1>
            <p style="color: #475569;">Notes · PYQs · Smart Learning Platform</p>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search semesters...">
            </div>
        </div>

        <h2>📚 All Semesters</h2>
        <div id="semestersGrid" class="grid">
            <div class="loading">Loading semesters...</div>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 BCA Nexus — Premium Learning Platform</p>
    </div>

    <script>
        // 🔴🔴🔴 YAHAN APNA SUPABASE URL AUR KEY DALO 🔴🔴🔴
        const SUPABASE_URL = 'https://vsggrvcbpinazybuxzny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPNwR4HTlKfm5hoQEgA-eA_EhVzqSuu';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function loadSemesters() {
            const grid = document.getElementById('semestersGrid');
            grid.innerHTML = '<div class="loading">⏳ Loading semesters...</div>';
            
            try {
                const { data, error } = await supabase.from('semesters').select('*').order('id');
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="card" style="grid-column: 1/-1; text-align:center;">
                            <p>No semesters found. Please add semesters in Supabase.</p>
                            <p style="font-size:0.8rem; margin-top:8px;">Run: INSERT INTO semesters (name) VALUES ('1'),('2'),('3');</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = data.map(s => `
                    <div class="card" onclick="window.location.href='semester.html?id=${s.id}'">
                        <div style="font-size: 2rem;">📖</div>
                        <div style="font-weight: 600; margin-top: 8px;">Semester ${s.name}</div>
                        <div style="font-size: 0.75rem; color: #0891b2; margin-top: 8px;">Explore →</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error:', err);
                grid.innerHTML = `
                    <div class="card" style="grid-column: 1/-1; text-align:center;">
                        <p>❌ Connection Error</p>
                        <p style="font-size:0.8rem;">${err.message}</p>
                        <p style="font-size:0.8rem; margin-top:8px;">Check Supabase URL and Anon Key</p>
                    </div>
                `;
            }
        }
        
        // Search functionality
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            if (e.target.value.length > 2) {
                window.location.href = `semester.html?search=${encodeURIComponent(e.target.value)}`;
            }
        });
        
        // Load everything
        loadSemesters();
    </script>
</body>
</html>
